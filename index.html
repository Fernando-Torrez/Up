<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Our Adventure Book — Carl & Ellie</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@700&family=Short+Stack&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
  :root {
    --leather-dark: #3d2314;
    --leather-light: #5c3a21;
    --paper-clean: #fffbf2;
    --paper-old: #f3ebd9;
    --tape-color: rgba(244, 232, 203, 0.6);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; overflow: hidden;
    font-family: 'Short Stack', cursive;
    /* Fondo del cielo con nubes sutiles */
    background: linear-gradient(180deg, #bbf2f6 0%, #86e3ce 100%);
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    perspective: 2000px;
  }

  /* --- FONDO DE GLOBOS 3D MEJORADOS --- */
  #sky-canvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  
  .balloon {
    position: absolute; bottom: -120px; width: 45px; height: 55px; 
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.15));
  }
  /* Efecto de luz/volumen en el globo */
  .balloon::before {
    content: ''; position: absolute; top: 8px; left: 10px; width: 10px; height: 15px;
    background: rgba(255,255,255,0.4); border-radius: 50%; transform: rotate(-20deg);
  }
  /* Nudo del globo */
  .balloon::after {
    content: ""; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
    border-left: 5px solid transparent; border-right: 5px solid transparent;
    border-bottom: 7px solid currentColor; filter: brightness(0.8);
  }
  .balloon-string {
    position: absolute; bottom: -45px; left: 50%; width: 1px; height: 45px;
    background: rgba(0, 0, 0, 0.15); transform-origin: top center;
  }

  /* --- ESTRUCTURA GIGANTE DEL LIBRO --- */
  .book-viewport {
    position: relative; z-index: 5;
    width: min(1100px, 95vw); height: min(680px, 82vh);
    transform-style: preserve-3d;
    transition: transform 0.6s ease;
  }

  /* El lomo/pasta exterior de cuero */
  .book-cover {
    position: absolute; inset: -12px -18px;
    background: var(--leather-dark);
    background-image: 
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,0.4) 100%),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 10px);
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.6);
    border: 5px solid #28160c;
  }

  /* Bisagra central del libro */
  .book-spine {
    position: absolute; left: 50%; top: 0; bottom: 0; width: 40px; 
    transform: translateX(-50%); background: #28160c; z-index: 10;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
  }

  /* Páginas Libro Abierto (Contenedor de hojas) */
  .pages-container {
    position: absolute; inset: 0; display: flex; transform-style: preserve-3d;
  }

  /* Bloque de Hojas Izquierda y Derecha */
  .book-half {
    flex: 1; position: relative; background: var(--paper-old);
    padding: 35px; display: flex; flex-direction: column;
    justify-content: space-between; align-items: center; overflow: hidden;
    box-shadow: inset 0 0 30px rgba(92,58,33,0.2);
  }
  .book-half.left {
    border-radius: 8px 0 0 8px; border-right: 2px solid rgba(0,0,0,0.2);
    background-image: linear-gradient(90deg, rgba(0,0,0,0.05) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.15) 100%);
  }
  .book-half.right {
    border-radius: 0 8px 8px 0; border-left: 2px solid rgba(0,0,0,0.2);
    background-image: linear-gradient(270deg, rgba(0,0,0,0.05) 0%, transparent 5%, transparent 95%, rgba(0,0,0,0.15) 100%);
  }

  /* Textura de hojas amontonadas en los bordes */
  .book-half::after {
    content: ''; position: absolute; bottom: -5px; height: 5px; background: #dcd1ba;
    box-shadow: 0 1px 0 #bfae93, 0 2px 0 #ab9a7e, 0 3px 0 #96866b;
  }
  .left::after { left: 10px; right: 0; border-radius: 0 0 0 5px; }
  .right::after { right: 10px; left: 0; border-radius: 0 0 5px 0; }

  /* --- DETALLES DE RECORTE (SCRAPBOOK) --- */
  .photo-holder {
    width: 90%; height: 75%; background: #ffffff; padding: 15px 15px 45px 15px;
    box-shadow: 3px 6px 15px rgba(0,0,0,0.15); border: 1px solid #e2dacf;
    position: relative; transform: rotate(var(--r, 1deg));
  }
  .photo-holder img { width: 100%; height: 100%; object-fit: cover; }
  
  /* Cintas adhesivas en las esquinas */
  .tape-deco {
    position: absolute; width: 75px; height: 25px; background: var(--tape-color);
    backdrop-filter: blur(1px); transform: rotate(-35deg); top: -8px; left: -15px;
    box-shadow: 1px 2px 3px rgba(0,0,0,0.05);
  }
  .tape-deco.tr { left: auto; right: -15px; transform: rotate(35deg); }

  /* Cuaderno de notas o cartón de texto */
  .text-card {
    width: 90%; padding: 15px 20px; background: rgba(255,255,255,0.6);
    border-radius: 6px; border-left: 4px solid var(--leather-light);
    font-size: clamp(14px, 1.8vw, 20px); line-height: 1.5; text-align: left;
    color: #312217; transform: rotate(var(--tr, -0.5deg));
  }

  /* --- PORTADA DISEÑO FIEL --- */
  .custom-cover-view {
    position: absolute; inset: 0; background: var(--leather-light); z-index: 20;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    border-radius: 8px; border: 4px solid #422815;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
  }
  .cover-title {
    font-family: 'Cabin Sketch', cursive; font-size: clamp(40px, 6vw, 75px);
    color: #f7ebd9; text-align: center; margin: 0;
    text-shadow: 3px 4px 0px #21130a; letter-spacing: 2px;
  }
  .grape-soda-badge {
    width: 110px; height: 110px; background: #dedede; border-radius: 50%;
    border: 5px dashed #8a8a8a; margin-bottom: 30px; display: flex;
    justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    position: relative; cursor: pointer;
  }
  .grape-soda-badge::after {
    content: "GRAPE\nSODA"; white-space: pre-line; text-align: center;
    font-family: 'Cabin Sketch', cursive; font-size: 14px; font-weight: bold;
    color: white; background: #5a2c6d; padding: 12px; border-radius: 50%;
    border: 3px solid white; box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
  }

  /* --- CONTROLES --- */
  .nav-bar { display: flex; gap: 30px; margin-top: 25px; z-index: 10; }
  .btn-nav {
    appearance: none; border: 0; background: var(--leather-dark); color: #f7ebd9;
    padding: 14px 32px; font-family: inherit; font-size: 18px; font-weight: bold;
    border-radius: 30px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    display: flex; align-items: center; gap: 10px; transition: all 0.2s;
  }
  .btn-nav:hover { background: #21130a; transform: translateY(-2px); }
  .btn-nav:disabled { background: #705f55; opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Ocultar elementos lógicos */
  .hidden { display: none !important; }
</style>
</head>
<body>

  <div id="sky-canvas"></div>

  <main class="book-viewport" id="book-window">
    <div class="book-cover"></div>
    <div class="book-spine"></div>

    <div class="custom-cover-view" id="front-cover">
      <div class="grape-soda-badge" id="badge-click" title="¡Haz clic para una sorpresa!"></div>
      <h2 class="cover-title">Our Adventure Book</h2>
      <p style="color: #dac7ad; margin-top: 15px; font-size: 18px;">Click en Siguiente para abrir...</p>
    </div>

    <div class="pages-container hidden" id="pages-layout">
      
      <section class="book-half left">
        <div class="photo-holder" id="left-photo-frame" style="--r: -1.2deg;">
          <div class="tape-deco"></div>
          <div class="tape-deco tr"></div>
          <img src="" id="left-img" alt="Momento de aventura">
        </div>
      </section>

      <section class="book-half right">
        <div class="text-card" id="right-text-frame" style="--tr: 1deg;">
          <p id="right-text">Cargando memorias...</p>
        </div>
        <span id="page-number" style="font-size: 14px; opacity: 0.6; font-weight: bold;">Placa 1</span>
      </section>

    </div>
  </main>

  <nav class="nav-bar">
    <button class="btn-nav" id="prev-page" disabled><i class="fa-solid fa-chevron-left"></i> Anterior</button>
    <button class="btn-nav" id="next-page">Siguiente <i class="fa-solid fa-chevron-right"></i></button>
  </nav>

<script>
  // Estructura cronológica de la historia
  const adventureSteps = [
    {
      img: "https://i.pinimg.com/736x/fe/cc/e1/fecce155c3031f268edc605eda2237d6.jpg",
      text: "«Desde pequeños supimos mirar hacia el mismo horizonte. Cada juego, cada mirada silenciosa, marcaba el inicio del mapa de nuestras vidas.» ✨"
    },
    {
      img: "https://i.pinimg.com/736x/eb/7e/ec/eb7eecd78eb4e80e3bdfd659dd53f3e9.jpg",
      text: "«¿Me lo prometes? Júralo con el corazón... Porque construir un sueño a tu lado es el único plan que quiero cumplir.» ❤️"
    },
    {
      img: "https://i.pinimg.com/736x/3c/e9/8f/3ce98f30495c1574d16d6007d412b83c.jpg",
      text: "«Hice un juramento sagrado aquella tarde, y hoy te lo repito: te seguiré a donde el viento nos lleve, cuidando siempre de ti.» 🤝"
    },
    {
      img: "https://i.pinimg.com/736x/30/b0/eb/30b0ebb3a429d585b0881c5c701eae32.jpg",
      text: "«Eres oficialmente el capitán de mi tripulación, mi compañero de aventuras y poseedor de mi chapa favorita del mundo.» 🍇"
    },
    {
      img: "https://i.pinimg.com/736x/16/5f/9d/165f9d080237e2bcf3de9c29043f671d.jpg",
      text: "«Los años pasaron volando, pero entre tus brazos descubrí que no hacen falta grandes mapas para estar en el rincón más hermoso del universo.»"
    },
    {
      img: "https://i.pinimg.com/736x/65/24/79/652479f263ce1ef1ac265031631043c7.jpg",
      text: "«Y si la rutina intenta ganarnos, ataremos mil globos de colores a nuestro tejado y dejaremos el suelo atrás... juntos.» 🎈"
    },
    {
      img: "https://i.pinimg.com/736x/e3/c0/7b/e3c07b40aa5b3eea6dfd4fb491f97126.jpg",
      text: "«Gracias por esta hermosa aventura... ¡Ahora te toca a ti vivir una nueva! Te amo por siempre y para siempre.» — Ellie 🕊️"
    }
  ];

  let stepIndex = -1; // -1 significa que estamos viendo la Portada exterior

  const frontCover = document.getElementById('front-cover');
  const pagesLayout = document.getElementById('pages-layout');
  const leftImg = document.getElementById('left-img');
  const rightText = document.getElementById('right-text');
  const pageNumber = document.getElementById('page-number');
  
  const btnPrev = document.getElementById('prev-page');
  const btnNext = document.getElementById('next-page');
  const sky = document.getElementById('sky-canvas');

  const palette = ['#ff7675', '#74b9ff', '#ffeaa7', '#a29bfe', '#ff9ff3', '#55efc4', '#ffbe76'];

  // Renderizar la página actual con animaciones fluidas de paso de hoja
  function renderStep(direction) {
    if (stepIndex === -1) {
      // Mostrar la portada de cuero de Ellie
      frontCover.classList.remove('hidden');
      pagesLayout.classList.add('hidden');
      btnPrev.disabled = true;
      return;
    }

    // Asegurar que el contenedor de hojas esté activo
    frontCover.classList.add('hidden');
    pagesLayout.classList.remove('hidden');
    btnPrev.disabled = false;
    btnNext.disabled = stepIndex === adventureSteps.length - 1;

    const data = adventureSteps[stepIndex];

    // Animación de cambio de contenido simula paso de página física
    gsap.fromTo("#book-window", 
      { rotationY: direction === 'next' ? 2 : -2 },
      { rotationY: 0, duration: 0.6, ease: "power2.out" }
    );

    gsap.fromTo([".photo-holder", ".text-card"],
      { opacity: 0, y: direction === 'next' ? 15 : -15 },
      { opacity: 1, y: 0, duration: 0.5, stagger: 0.1, ease: "back.out(1)" }
    );

    // Setear datos
    leftImg.src = data.img;
    rightText.innerHTML = data.text;
    pageNumber.innerText = `Aventura cap. ${stepIndex + 1}`;

    // Disparar globos festivos en cada transición
    for(let i=0; i<5; i++) setTimeout(spawnBalloon, i*80);
  }

  // Eventos de botones
  btnNext.addEventListener('click', () => {
    if (stepIndex < adventureSteps.length - 1) {
      stepIndex++;
      renderStep('next');
    }
  });

  btnPrev.addEventListener('click', () => {
    if (stepIndex >= 0) {
      stepIndex--;
      renderStep('prev');
    }
  });

  // Sorpresa interactiva en la chapa Grape Soda de la portada
  document.getElementById('badge-click').addEventListener('click', () => {
    gsap.to("#badge-click", { scale: 1.2, rotation: "+=15", yoyo: true, repeat: 1, duration: 0.15 });
    for(let i=0; i<30; i++) setTimeout(spawnBalloon, i * 35);
  });

  // Mecánica Avanzada de Globos Inflados en 3D
  function spawnBalloon() {
    const balloon = document.createElement('div');
    balloon.className = 'balloon';
    
    const string = document.createElement('div');
    string.className = 'balloon-string';
    balloon.appendChild(string);

    const chosenColor = palette[Math.floor(Math.random() * palette.length)];
    const startX = Math.random() * 100;
    const scale = Math.random() * (1.3 - 0.6) + 0.6;
    const speed = Math.random() * (9 - 5) + 5;

    balloon.style.backgroundColor = chosenColor;
    balloon.style.color = chosenColor; // Para que el nudo combine perfectamente
    balloon.style.left = `${startX}vw`;
    balloon.style.transform = `scale(${scale})`;

    sky.appendChild(balloon);

    // Animación de flotado hacia arriba con simulación de viento cruzado
    gsap.to(balloon, {
      bottom: '115vh',
      x: `+=${Math.random() * 80 - 40}`,
      duration: speed,
      ease: "power1.inOut",
      onComplete: () => balloon.remove()
    });

    // Péndulo físico del hilo del globo independiente
    gsap.to(string, {
      rotation: Math.random() * 20 - 10,
      duration: 1.5,
      yoyo: true,
      repeat: -1,
      ease: "sine.inOut"
    });
  }

  // Flujo constante de globos en el cielo
  setInterval(spawnBalloon, 700);
</script>
</body>
</html>
